services:
  mailcow-cleaner:
    build: .
    container_name: mailcow-cleaner
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-to-something-random}
      - APP_PASSWORD=${APP_PASSWORD:-admin}
      - DATA_DIR=/app/data
